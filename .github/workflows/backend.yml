name: Backend
on:
  push: { paths: ['apps/api/**', 'evaluations/**', '.github/workflows/backend.yml'] }
  pull_request: { paths: ['apps/api/**', 'evaluations/**', '.github/workflows/backend.yml'] }
jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip, cache-dependency-path: apps/api/requirements.txt }
      - run: pip install -r requirements.txt
      - run: pytest
      - name: Deterministic evaluation
        working-directory: .
        run: python evaluations/runner.py
