name: Frontend
on:
  push: { paths: ['apps/web/**', '.github/workflows/frontend.yml'] }
  pull_request: { paths: ['apps/web/**', '.github/workflows/frontend.yml'] }
jobs:
  verify:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
